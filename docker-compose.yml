name: taskflow-elysia

services:
  postgres:
    image: postgres
    container_name: taskflow-elysia-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-taskflow-elysia}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - taskflow-elysia_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: taskflow-elysia-api
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${API_PORT:-4000}:4000"
    restart: unless-stopped

volumes:
  taskflow-elysia_postgres_data:
